<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />

  <title>Galaxy League</title>
  
  <link rel="dns-prefetch" href="//static.vercel.com">
  <link rel="dns-prefetch" href="//cdn.vercel-insights.com">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      background: #050505;
      overflow: hidden;
      position: fixed;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      touch-action: none;
      display: block;
    }
    
    /* Простой loading screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050505;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: 'Orbitron', sans-serif;
      color: white;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #00f2ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div id="loading-screen">
    <div style="text-align:center;">
      <div style="font-size:24px;font-weight:bold;margin-bottom:20px;">
        🌌 Galaxy League
      </div>
      <div class="spinner"></div>
      <div id="loading-text" style="font-size:14px;opacity:0.8;margin-top:20px;">
        Загрузка... 0%
      </div>
    </div>
  </div>

  <div id="game-container"></div>

  <script>
    window.onerror = function(msg, url, line) {
      const loadingText = document.getElementById('loading-text');
      if (loadingText) {
        loadingText.textContent = 'Ошибка загрузки. Обновите страницу.';
      }
      return true;
    };
  </script>

  <script nomodule>
    (function() {
      const loadingText = document.getElementById('loading-text');
      if (loadingText) {
        loadingText.textContent = 'Ваш браузер не поддерживается. Обновите браузер.';
      }
      alert('Ваш браузер не поддерживает современную версию игры. Обновите браузер.');
    })();
  </script>

  <script type="module" async defer src="./src/main.ts"></script>

  <script>
    // Простые хелперы для loading screen
    (function() {
      window.updateLoadingProgress = function(percent, text) {
        const textEl = document.getElementById('loading-text');
        if (textEl) {
          textEl.textContent = text || ('Загрузка... ' + percent + '%');
        }
      };

      window.hideLoadingScreen = function() {
        const loadingElement = document.getElementById('loading-screen');
        if (!loadingElement) return;

        loadingElement.style.transition = 'opacity 0.3s ease-out';
        loadingElement.style.opacity = '0';
        loadingElement.style.pointerEvents = 'none';

        setTimeout(function() {
          if (loadingElement.parentNode) {
            loadingElement.parentNode.removeChild(loadingElement);
          }
        }, 300);
      };

      // Аварийное скрытие через 15 секунд
      setTimeout(function() {
        const loading = document.getElementById('loading-screen');
        if (loading && loading.style.opacity !== '0') {
          console.warn('[HTML] Force hiding loading screen');
          window.hideLoadingScreen();
        }
      }, 15000);
    })();
  </script>

</body>
</html>
